name: CI/CD - Build & Push Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Login to Bunker Registry
      uses: docker/login-action@v2
      with:
        registry: bunker.mantracare.com
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          bunker.mantracare.com/lovable/financial_wellbeing:1.1
          bunker.mantracare.com/lovable/financial_wellbeing:latest
          bunker.mantracare.com/lovable/financial-wellness:1.1
        cache-from: type=gha
        cache-to: type=gha,mode=max
